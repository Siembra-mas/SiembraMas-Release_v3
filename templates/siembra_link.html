{% extends 'base.html' %}

{% block content %}

<section class="section-padding" style="background-color: #E8F1E0; min-height: 100vh;">
    <div class="container">
        
        <div style="margin-bottom: 2rem;">
            <h2 style="color: var(--dark-green);">MONITOR DE CULTIVO</h2>
        </div>

        <div class="gemelo-grid">
            
            <div class="gemelo-card">
                <div class="gemelo-header">
                    <h3>Gemelo Digital</h3>
                    <span class="status-pill"><i class="fa-solid fa-circle" style="font-size: 8px; margin-right: 5px;"></i> En línea</span>
                </div>

                <div class="plant-visual-area">
                    <div class="digital-stem" style="height: 60%;">
                        <div class="digital-leaf leaf-left" style="bottom: 20%;"></div>
                        <div class="digital-leaf leaf-right" style="bottom: 40%;"></div>
                        <div class="digital-leaf leaf-left" style="bottom: 70%;"></div>
                    </div>
                    
                    <div class="digital-soil"></div>
                </div>

                <div style="padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; color: var(--medium-green);">
                        <span>Progreso de Etapa</span>
                        <span id="porcentaje-etapa">60%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: 60%;"></div>
                    </div>
                </div>
            </div>

            <div class="data-column">
                
                <h4 class="section-label">LECTURAS ACTUALES</h4>
                <div class="readings-grid">
                    <div class="reading-card card-hum">
                        <div class="reading-icon"><i class="fa-solid fa-droplet"></i></div>
                        <div class="reading-info">
                            <span class="reading-label">Humedad</span>
                            <span class="reading-value" id="text-hum">65%</span>
                        </div>
                    </div>

                    <div class="reading-card card-temp">
                        <div class="reading-icon"><i class="fa-solid fa-temperature-half"></i></div>
                        <div class="reading-info">
                            <span class="reading-label">Temp. Amb.</span>
                            <span class="reading-value" id="text-temp">24°C</span>
                        </div>
                    </div>

                    <div class="reading-card card-soil">
                        <div class="reading-icon"><i class="fa-solid fa-layer-group"></i></div>
                        <div class="reading-info">
                            <span class="reading-label">Lluvia Acum.</span>
                            <span class="reading-value" id="text-lluvia">12mm</span>
                        </div>
                    </div>
                </div>

                <div class="config-card">
                    <h4 class="config-title">CONFIGURACIÓN</h4>

                    <div class="form-group-clean">
                        <label>Cultivo Monitoreado</label>
                        <div class="select-box">
                            <i class="fa-solid fa-seedling icon-input"></i>
                            <select id="cultivo-select" class="clean-select">
                                <option value="" disabled selected>-- Seleccionar --</option>
                                {% for cultivo in lista_cultivos %}
                                    <option value="{{ cultivo }}">{{ cultivo }}</option>
                                {% endfor %}
                            </select>
                            <i class="fa-solid fa-chevron-down icon-arrow"></i>
                        </div>
                    </div>

                    <div class="form-group-clean">
                        <label>Etapa de Desarrollo</label>
                        <div class="select-box">
                            <i class="fa-solid fa-chart-line icon-input"></i>
                            <select id="etapa-select" class="clean-select">
                                <option value="1" selected>1. Germinación (Inicio)</option>
                                <option value="2">2. Floración (Intermedia)</option>
                                <option value="3">3. Maduración (Final)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down icon-arrow"></i>
                        </div>
                    </div>

                    <div class="form-group-clean">
                        <label>Frecuencia de Lectura</label>
                        <div class="select-box">
                            <i class="fa-regular fa-clock icon-input"></i>
                            <select class="clean-select">
                                <option>Tiempo Real (5 min)</option>
                                <option>Ahorro Energía (1 hr)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down icon-arrow"></i>
                        </div>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #eee; margin: 1.5rem 0;">

                    <button id="btn-actualizar" class="btn-pronostico">
                        <span>Actualizar / Pronosticar</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                    
                    <div style="text-align: center; margin-top: 1rem;">
                         <small style="color: #888; font-size: 0.8rem;"><i class="fa-solid fa-circle-info"></i> Requiere 30 días de historial para activar IA.</small>
                    </div>

                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
