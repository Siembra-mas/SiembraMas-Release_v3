{% extends 'base.html' %}

{% block content %}
<header class="page-header bg-darker">
    <div class="container">
        <h1>Siembra Visión</h1>
        <p>Diagnóstico fitosanitario por imagen.</p>
    </div>
</header>

<section class="section-padding">
    <div class="container">
        
        <div class="vision-options" style="margin-bottom: 20px;">
            <button id="btn-camara" class="btn" onclick="activarCamara()"><i class="fa-solid fa-camera"></i> Usar Cámara</button>
            <button id="btn-upload" class="btn btn-outline" onclick="activarUpload()" style="color: var(--dark-green); border-color: var(--dark-green);">
                <i class="fa-solid fa-upload"></i> Subir Foto
            </button>
        </div>

        <div id="panel-camara" class="vision-panel" style="display:none;">
            <div style="background: #000; position: relative; border-radius: 12px; overflow: hidden; max-width: 500px; margin: 0 auto;">
                <video id="video-stream" autoplay playsinline style="width: 100%; height: auto;"></video>
                <canvas id="canvas-capture" style="display:none;"></canvas>
            </div>
            <div style="text-align: center; margin-top: 1rem;">
                <button class="btn" onclick="tomarFoto()">Capturar y Analizar</button>
            </div>
        </div>

        <div id="panel-upload" class="vision-panel">
            <div class="upload-area" style="border: 2px dashed #ccc; padding: 2rem; text-align: center; cursor: pointer;" onclick="document.getElementById('input-file').click()">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: var(--medium-green);"></i>
                <p>Haz clic para seleccionar o arrastra una imagen.</p>
                <input type="file" id="input-file" accept="image/*" style="display: none;" onchange="manejarArchivo(this.files[0])">
            </div>
        </div>

        <div id="loading" style="display:none; text-align: center; margin-top: 2rem;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: var(--accent-green);"></i>
            <p>Analizando hoja con IA...</p>
        </div>

        <div id="resultados-container" style="display: none; margin-top: 3rem; border-top: 1px solid #ddd; padding-top: 2rem;">
            <h3>Resultados de Análisis:</h3>
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start;">
                <div style="flex: 1; max-width: 300px;">
                    <img id="img-preview" src="" style="width: 100%; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                </div>
                
                <div style="flex: 2;">
                    <ul style="list-style: none; padding: 0;">
                        <li style="background: var(--white); padding: 1.5rem; margin-bottom: 1rem; border-left: 6px solid var(--accent-green); border-radius: 0 8px 8px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                            <strong style="display: block; font-size: 0.9rem; color: #666; margin-bottom: 0.5rem; text-transform: uppercase;">Diagnóstico Detectado:</strong>
                            <span id="res-diagnostico" style="font-size: 1.8rem; font-weight: 800; color: var(--dark-green);">--</span>
                        </li>
                        
                        <li style="background: #fff; padding: 1.5rem; border: 1px solid #eee; border-radius: 8px;">
                            <strong style="display: block; font-size: 1.1rem; color: var(--medium-green); margin-bottom: 0.5rem;">
                                <i class="fa-solid fa-circle-info"></i> Información y Recomendación:
                            </strong>
                            <p id="res-descripcion" style="font-size: 1.1rem; line-height: 1.6; color: #444; margin: 0;">
                                --
                            </p>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </div>
</section>

<script>
    let streamActual = null;

    function activarUpload() {
        detenerCamara();
        document.getElementById('panel-camara').style.display = 'none';
        document.getElementById('panel-upload').style.display = 'block';
    }

    function activarCamara() {
        document.getElementById('panel-upload').style.display = 'none';
        document.getElementById('panel-camara').style.display = 'block';
        
        const video = document.getElementById('video-stream');
        
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    streamActual = stream;
                    video.srcObject = stream;
                    video.play();
                })
                .catch(function(err) {
                    alert("Error al acceder a la cámara: " + err);
                });
        }
    }

    function detenerCamara() {
        if (streamActual) {
            streamActual.getTracks().forEach(track => track.stop());
            streamActual = null;
        }
    }

    function tomarFoto() {
        const video = document.getElementById('video-stream');
        const canvas = document.getElementById('canvas-capture');
        const context = canvas.getContext('2d');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(function(blob) {
            const urlPreview = URL.createObjectURL(blob);
            document.getElementById('img-preview').src = urlPreview;
            
            enviarAlServidor(blob);
        }, 'image/jpeg', 0.95);
    }

    function manejarArchivo(file) {
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('img-preview').src = e.target.result;
            }
            reader.readAsDataURL(file);
            
            enviarAlServidor(file);
        }
    }

    function enviarAlServidor(fileBlob) {
        const formData = new FormData();
        formData.append('file', fileBlob, 'imagen.jpg');

        // UI Updates: Mostrar loading, ocultar resultados anteriores
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultados-container').style.display = 'none';

        fetch('/siembra-vision/analizar', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            if (data.success) {
                document.getElementById('resultados-container').style.display = 'block';
                
                // Mostrar Diagnóstico
                document.getElementById('res-diagnostico').textContent = data.data.diagnostico;
                
                // Mostrar Descripción (Nueva funcionalidad)
                document.getElementById('res-descripcion').textContent = data.data.descripcion;
                
            } else {
                alert('Error: ' + (data.error || 'Desconocido'));
            }
        })
        .catch(error => {
            document.getElementById('loading').style.display = 'none';
            alert('Error de conexión con el servidor.');
            console.error(error);
        });
    }
</script>
{% endblock %}
